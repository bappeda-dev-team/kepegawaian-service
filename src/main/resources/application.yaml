server:
  port: 8080
  shutdown: graceful
  tomcat:
    connection-timeout: 3s
    keepalive-timeout: 10s
    threads:
      max: 1000
      min-spare: 300

spring:
  application:
    name: kepegawaian
  datasource:
    url: jdbc:postgresql://localhost:5432/kepegawaian_dev
    username: kepegawaian_user
    password: kepegawaian_password
    hikari:
      maximum-pool-size: 5
      connection-timeout: 30000
      maximum-lifetime: 30000
  flyway:
    url: ${spring.datasource.url}
    user: ${spring.datasource.username}
    password: ${spring.datasource.password}
    schemas: kepegawaian
  jackson:
    property-naming-strategy: SNAKE_CASE

management:
  endpoints:
    web:
      base-path: /actuator
      exposure:
        include: "health, info, prometheus"

  endpoint:
    health:
      show-details: never

  prometheus:
    metrics:
      export:
        enabled: true

kertaskerja:
  kode-lembaga: XX.XX
